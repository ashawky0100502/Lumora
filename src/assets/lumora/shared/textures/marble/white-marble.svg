<svg xmlns="http://www.w3.org/2000/svg" width="4096" height="4096" viewBox="0 0 4096 4096">
  <defs>
    <linearGradient id="bgWhite" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbfaf7"/>
      <stop offset="35%" stop-color="#f3efe8"/>
      <stop offset="100%" stop-color="#e8e2d8"/>
    </linearGradient>
    <linearGradient id="veinWhite" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.60"/>
      <stop offset="50%" stop-color="#dfd7c7" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#bfb298" stop-opacity="0.20"/>
    </linearGradient>
    <filter id="grainWhite" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="4" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feGaussianBlur stdDeviation="0.6" result="soft"/>
      <feBlend in="SourceGraphic" in2="soft" mode="screen"/>
    </filter>
    <filter id="blurWhite" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <pattern id="marblePatternWhite" width="2200" height="2200" patternUnits="userSpaceOnUse">
      <rect width="2200" height="2200" fill="url(#bgWhite)"/>
      <rect width="2200" height="2200" fill="url(#veinWhite)" opacity="0.55"/>
      <g filter="url(#grainWhite)" opacity="0.95">
        <rect width="2200" height="2200" fill="#ffffff" opacity="0.08"/>
      </g>
      <path d="M-150 540C420 220, 760 260, 1110 640S1890 1260, 2360 840" stroke="#d7cdb9" stroke-width="24" fill="none" stroke-linecap="round" opacity="0.45"/>
      <path d="M-120 1260C420 960, 860 1180, 1320 1360S1910 1760, 2360 1380" stroke="#c3b7a0" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.35"/>
      <path d="M380 0C780 460, 1030 640, 1540 900S2230 1500, 2360 2200" stroke="#e5ddce" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.30"/>
      <path d="M520 2200C960 1680, 1230 1580, 1680 1820S2230 2340, 2380 2710" stroke="#b8a992" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.24"/>
      <circle cx="1320" cy="840" r="520" fill="#ffffff" opacity="0.09" filter="url(#blurWhite)"/>
      <circle cx="1760" cy="1820" r="640" fill="#efe7d9" opacity="0.10" filter="url(#blurWhite)"/>
    </pattern>
  </defs>
  <rect width="4096" height="4096" fill="url(#marblePatternWhite)"/>
  <rect width="4096" height="4096" fill="url(#marblePatternWhite)" opacity="0.95"/>
</svg>
