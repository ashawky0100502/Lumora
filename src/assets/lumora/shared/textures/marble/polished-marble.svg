<svg xmlns="http://www.w3.org/2000/svg" width="4096" height="4096" viewBox="0 0 4096 4096">
  <defs>
    <linearGradient id="bgPolished" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f6f3"/>
      <stop offset="30%" stop-color="#ece7de"/>
      <stop offset="70%" stop-color="#d8d0c2"/>
      <stop offset="100%" stop-color="#b7ac95"/>
    </linearGradient>
    <linearGradient id="shinePolished" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="40%" stop-color="#efe7d5" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#8e7856" stop-opacity="0.16"/>
    </linearGradient>
    <filter id="grainPolished" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.0105" numOctaves="5" seed="21" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feGaussianBlur stdDeviation="0.8" result="soft"/>
      <feBlend in="SourceGraphic" in2="soft" mode="overlay"/>
    </filter>
    <filter id="blurPolished" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <pattern id="marblePatternPolished" width="2200" height="2200" patternUnits="userSpaceOnUse">
      <rect width="2200" height="2200" fill="url(#bgPolished)"/>
      <rect width="2200" height="2200" fill="url(#shinePolished)" opacity="0.70"/>
      <g filter="url(#grainPolished)" opacity="0.96">
        <rect width="2200" height="2200" fill="#ffffff" opacity="0.08"/>
      </g>
      <path d="M-160 620C260 270, 620 310, 1060 720S1820 1430, 2320 860" stroke="#d9ccaf" stroke-width="30" fill="none" stroke-linecap="round" opacity="0.48"/>
      <path d="M180 0C740 420, 1120 600, 1600 980S2240 1720, 2400 2200" stroke="#f0e4cf" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.34"/>
      <path d="M420 2200C960 1760, 1260 1660, 1720 1880S2220 2420, 2460 2600" stroke="#946f44" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.16"/>
      <path d="M140 1380C510 1000, 820 980, 1280 1230S1980 1710, 2360 1440" stroke="#c2a97d" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.20"/>
      <circle cx="1420" cy="860" r="610" fill="#ffffff" opacity="0.12" filter="url(#blurPolished)"/>
      <circle cx="1760" cy="1760" r="760" fill="#f0e0bb" opacity="0.15" filter="url(#blurPolished)"/>
    </pattern>
  </defs>
  <rect width="4096" height="4096" fill="url(#marblePatternPolished)"/>
  <rect width="4096" height="4096" fill="url(#marblePatternPolished)" opacity="0.96"/>
</svg>
